<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Punahbi Swaad  | Digital Menu</title>
    <link rel="icon" type="image/x-icon" href="/static/logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link
      href="https://db.onlinewebfonts.com/c/a000eb9c75868b4d76c4c0c4aa845cce?family=Core+Sans+M+W01+SC+75+ExtraBold"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrious/dist/qrious.min.js"></script>
    <link rel="stylesheet" href="/static/animate.css" />
    <style>
      /* ================= GLOBAL ================= */  
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        overflow-y: auto;
        height: auto;
      }

      /* Space for fixed header */
      main {
        padding-top: 120px;
      }

      /* ================= TEXT ================= */
      .item-label {
        font-family: sans-serif;
        font-weight: bold;
        color: black;
        opacity: 0.85;
      }

      .core-sans {
        font-family: "Core Sans M W01 SC 75 ExtraBold", Arial, sans-serif;
        font-weight: 800;
        letter-spacing: 0.02em;
      }

      /* ================= BACKGROUND ================= */
      .hero-bg {
        background:
          radial-gradient(ellipse at top, #b49633 0%, transparent 50%),
          radial-gradient(ellipse at bottom left, #f4e4bc 0%, transparent 50%),
          radial-gradient(ellipse at bottom right, #ffe082 0%, transparent 50%),
          radial-gradient(
            circle at 20% 80%,
            rgba(255, 193, 7, 0.3) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 80% 20%,
            rgba(255, 152, 0, 0.2) 0%,
            transparent 50%
          );
        background-color: #fffde7;
        background-blend-mode: overlay;
      }

      /* ================= FIXED HEADER ================= */
      .fixed-header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 100;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }

      /* ================= CART BADGE ================= */
      .cart-badge {
        background: linear-gradient(135deg, #ff5722, #ff7043);
        box-shadow: 0 4px 16px rgba(255, 87, 34, 0.4);
      }

      /* ================= SAVED BILLS GRID ================= */

      @media (min-width: 480px) {
        #savedBillsList {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (min-width: 768px) {
        #savedBillsList {
          grid-template-columns: repeat(4, 1fr);
        }
      }

      @media (min-width: 1024px) {
        #savedBillsList {
          grid-template-columns: repeat(4, 1fr);
        }
      }

      /* ================= SAVED BILLS PANEL ================= */
      #savedBillsPanel {
        overflow-y: auto;
        max-height: 90vh;
        margin-top: 60px;
      }

      /* Modern quantity stepper */
      #qtyMinus,
      #qtyPlus {
        cursor: pointer;
        user-select: none;
      }

      #newItemQty {
        pointer-events: none; /* readonly visually */
      }

      /* Optional: adjust stepper height */
      #qtyMinus,
      #qtyPlus {
        height: 36px;
      }

      #newItemQty {
        height: 36px;
        font-size: 14px;
      }
      /* ================= MENU LAYOUT ================= */
      /* 📱 MOBILE DEFAULT (normal page scroll) */
      .menu-layout {
        display: flex;
        flex-direction: column;
      }
      .menu-col {
        width: 100%;
      }
      /* 💻 TABLET LAYOUT */
      @media (min-width: 768px) {
        .menu-layout {
          flex-direction: row;
          gap: 15px;
        }

        #leftColumn {
          width: 45%;
        }
        #rightColumn {
          width: 55%;
        }
      }
      /* 🖥 DESKTOP APP-STYLE LAYOUT */
      @media (min-width: 1024px) {
        .menu-layout {
          min-height: calc(100vh - 140px); /* IMPORTANT */
        }

        #leftColumn {
          width: 40%;
          padding-right: 10px;
        }

        #rightColumn {
          width: 60%;
          padding-left: 10px;
        }

        /* Scroll inside columns only on desktop */
        .menu-col {
          overflow-y: auto;
          max-height: calc(100vh - 140px);
        }
      }

      /* ================= MOBILE SCROLL PROTECTION ================= */
      @media (max-width: 1023px) {
        .menu-layout,
        .menu-col {
          height: auto !important;
          max-height: none !important;
          overflow: visible !important;
        }
      }
      /* ================= SCROLLBAR HIDE ================= */
      .scrollbar-none::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-none {
        scrollbar-width: none;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        scrollbar-width: none;
      }
    </style>
  </head>
  <body id="bg" class="hero-bg min-h-screen font-sans antialiased">
    <div id="mobileUI">
      <!-- HEADER -->
      <header
        class="fixed-header md:relative top-0 z-50 bg-[#fffde7]/90 backdrop-blur"
      >
        <div
          class="mx-auto px-3 py-2 flex items-center justify-between gap-2 max-w-7xl"
        >
          <!-- Logo + Title -->
          <div class="flex items-center gap-2 flex-1 min-w-0">
            <div
              class="w-[50px] h-[50px] lg:w-[90px] lg:h-[90px] flex-shrink-0"
            >
              <img
                src="/static/logo.png"
                alt="Kahani Swaad Di"
                class="w-full h-full object-contain rounded-xl shadow border border-yellow-300/60 bg-yellow-50 p-1"
              />
            </div>
            <div class="min-w-0">
              <h1
                class="text-base sm:text-lg lg:text-2xl font-black leading-tight truncate"
              >
                <span style="color: #9bac50">PUNJABI</span>
                <span style="color: #d09a2e">SWAAD </span>
              </h1>
              <p
                class="text-xs sm:text-sm lg:text-base font-semibold text-yellow-800 truncate"
              >
                 Mohali,Punjab
              </p>
            </div>
          </div>
          <!-- Cart Button -->
          <div class="flex-shrink-0">
            <button
              id="openCartBtn"
              class="relative flex items-center gap-1 sm:gap-2 bg-gradient-to-br from-orange-500 to-red-500 text-white font-bold text-xs sm:text-sm md:text-base px-3 sm:px-4 py-2 rounded-xl shadow-lg border border-orange-400/40"
            >
              <i class="fas fa-shopping-cart text-base sm:text-lg"></i>
              <span id="cartTotal" class="font-black leading-none"> ₹0 </span>
              <!-- Badge -->
              <span
                id="cartBadge"
                class="absolute -top-2 -right-2 w-5 h-5 sm:w-6 sm:h-6 rounded-full text-white text-[10px] sm:text-xs flex items-center justify-center bg-gradient-to-br from-blue-400 to-green-500 border border-white"
              >
                0
              </span>
            </button>
          </div>
        </div>
      </header>
      <!-- MAIN GRID -->
      <main class="menu-layout max-w-7xl gap-20 mx-auto px-4 lg:p-10">
        <section id="leftColumn" class="menu-col hide-scrollbar"></section>
        <section id="rightColumn" class="menu-col hide-scrollbar"></section>
      </main>
      <!-- SAVED BILLS PANEL -->
      <div
        id="toggleBillsBtn"
        class="fixed left-0 top-1/2 -translate-y-1/2 bg-orange-500 text-white px-2 py-3 rounded-r-lg cursor-pointer shadow-lg z-50"
      >
        >
      </div>
      <div
        id="savedBillsPanel"
        class="fixed left-[-1400px] top-20 w-[95vw] max-w-[1200px] bg-white shadow-2xl rounded-2xl p-4 z-40 max-h-[70vh] overflow-y-auto border transition-all duration-300"
      >
        <h2 class="text-lg font-bold mb-3 text-orange-500">Saved Bills</h2>
        <div
          id="savedBillsList"
          class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3"
        ></div>
      </div>
      <!-- CART MODAL -->
      <div
        id="cartModal"
        class="fixed inset-0 bg-black bg-opacity-50 z-50 flex flex-col items-center p-4 w-[100vw] h-[100vh] hidden"
      >
        <div
          class="bg-white rounded-2xl shadow-2xl w-full max-w-lg md:max-w-2xl lg:max-w-3xl p-6 flex flex-col gap-4 relative"
        >
          <button
            id="closeCartBtn"
            class="absolute top-4 right-4 text-gray-500 hover:text-gray-800 bg-gradient-to-br from-gray-200 to-gray-300 rounded-md p-2 shadow-lg hover:shadow-xl transition-all flex items-center gap-2 font-bold"
          >
            Close <i class="fas fa-times text-xl"></i>
          </button>
          <h2 class="text-2xl lg:text-3xl font-black core-sans text-[#FD9960]">
            Your Cart
          </h2>
          <div class="max-h-96 overflow-y-auto hide-scrollbar">
            <table class="w-full text-sm text-left border">
              <thead class="bg-gray-100 sticky top-0">
                <tr>
                  <th class="p-2">Item</th>
                  <th class="p-2">Qty</th>
                  <th class="p-2">Price</th>
                  <th class="p-2">Total</th>
                  <th class="p-2">Remove</th>
                </tr>
              </thead>
              <tbody id="cartTableBody"></tbody>
            </table>
          </div>
          <div
            class="flex justify-between items-center text-lg lg:text-xl font-bold"
          >
            <span>Total:</span><span id="modalCartTotal">₹0</span>
          </div>
          <!-- DISCOUNT CONTROLS -->
          <div
            class="flex justify-between items-center mt-2 gap-2 text-sm font-semibold"
          >
            <span>Discount:</span>

            <div class="flex gap-2 items-center">
              <select
                id="discountType"
                class="border rounded-lg px-2 py-1 text-sm"
              >
                <option value="none">None</option>
                <option value="percentage">%</option>
                <option value="fixed">₹</option>
              </select>

              <input
                type="number"
                id="discountValue"
                value=""
                min="0"
                class="border rounded-lg px-2 py-1 w-20 text-sm"
              />
            </div>
          </div>

          <div
            class="flex justify-between items-center text-lg font-bold mt-2 text-green-600"
          >
            <span id="finalCartTotal"></span>
          </div>
          <div class="flex gap-3 mt-3 flex-col sm:flex-row">
            <button
              id="save-bill-btn"
              class="flex-1 bg-green-500 hover:bg-green-600 text-white font-semibold text-sm rounded-xl px-4 py-2 shadow-md hover:shadow-lg transition-all"
            >
              Save Bill
            </button>
            <button
              onclick="generateBillBtn()"
              class="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-semibold text-sm rounded-xl px-4 py-2 shadow-md hover:shadow-lg transition-all"
            >
              Generate Bill
            </button>
          </div>
        </div>
      </div>

      <!-- EDIT BILL MODAL -->
      <div
        id="editBillModal"
        class="hidden fixed inset-0 bg-black bg-opacity-50 flex flex-col items-center p-4 w-[100vw] h-[100vh] z-50"
      >
        <div
          class="bg-white rounded-2xl shadow-2xl w-full max-w-lg md:max-w-2xl lg:max-w-3xl p-6 flex flex-col relative h-[90vh]"
        >
          <button
            id="closeModal"
            class="absolute top-4 right-4 text-gray-500 hover:text-gray-800 bg-gradient-to-br from-gray-200 to-gray-300 rounded-md p-2 shadow-lg hover:shadow-xl transition-all flex items-center gap-2 font-bold"
          >
            Close <i class="fas fa-times text-xl"></i>
          </button>
          <h2
            id="editHeading"
            class="text-2xl lg:text-3xl font-black core-sans text-[#FD9960]"
          >
            Edit Bill
          </h2>
          <div class="flex-1 overflow-y-auto border rounded">
            <table class="w-full text-sm text-left border-collapse min-h-full">
              <thead class="bg-gray-100 sticky top-0 z-10">
                <tr>
                  <th class="p-2">Item</th>
                  <th class="p-2">Qty</th>
                  <th class="p-2">Price</th>
                  <th class="p-2">Total</th>
                  <th class="p-2">X</th>
                </tr>
              </thead>
              <tbody id="editTableBody"></tbody>
            </table>
          </div>
          <div
            class="flex justify-between items-center text-lg lg:text-xl font-bold"
          >
            <span>Total:</span><span id="editTotal">₹0</span>
          </div>
          <!-- EDIT DISCOUNT CONTROLS -->
          <div
            class="flex justify-between items-center mt-2 gap-2 text-sm font-semibold"
          >
            <span>Discount:</span>

            <div class="flex gap-2 items-center">
              <select
                id="editDiscountType"
                class="border rounded-lg px-2 py-1 text-sm"
              >
                <option value="none">None</option>
                <option value="percentage">%</option>
                <option value="fixed">₹</option>
              </select>

              <input
                type="number"
                id="editDiscountValue"
                min="0"
                class="border rounded-lg px-2 py-1 w-20 text-sm"
              />
            </div>
          </div>

          <div
            class="flex justify-between items-center text-lg font-bold mt-1 text-green-600"
          >
            <span id="editFinalTotal">₹0</span>
          </div>

          <div class="mb-4 border-t pt-3">
            <h3 class="font-semibold mb-2">Add New Item</h3>
            <!-- Menu Item Select -->
            <select
              id="menuItemSelect"
              class="border px-2 py-1 rounded mb-2 w-full"
            ></select>
            <!-- Modern Quantity Stepper -->
            <div class="flex items-center justify-between mb-2">
              <label class="text-sm font-semibold text-gray-700"
                >Quantity</label
              >
              <div
                class="flex items-center border rounded-lg overflow-hidden shadow-sm"
              >
                <button
                  type="button"
                  id="qtyMinus"
                  class="px-3 py-1 bg-gray-100 hover:bg-gray-200 text-lg font-bold"
                >
                  −
                </button>
                <input
                  type="text"
                  id="newItemQty"
                  value="1"
                  readonly
                  class="w-10 text-center font-bold outline-none"
                />
                <button
                  type="button"
                  id="qtyPlus"
                  class="px-3 py-1 bg-gray-100 hover:bg-gray-200 text-lg font-bold"
                >
                  +
                </button>
              </div>
            </div>
            <!-- Add Item Button -->
            <button
              id="addNewItemBtn"
              class="bg-blue-500 text-white py-1 rounded hover:bg-blue-600 w-full"
            >
              Add Item
            </button>
          </div>

          <div class="flex gap-3 mt-3 flex-col sm:flex-row">
            <button
              id="updateBillBtn"
              class="flex-1 bg-green-500 hover:bg-green-600 text-white font-semibold text-sm rounded-xl px-4 py-2 shadow-md hover:shadow-lg transition-all"
            >
              Update Bill
            </button>
            <button
              id="cancelEditBtn"
              class="flex-1 bg-red-500 hover:bg-red-600 text-white font-semibold text-sm rounded-xl px-4 py-2 shadow-md hover:shadow-lg transition-all"
            >
              Cancel
            </button>
          </div>
        </div>
      </div>
      <!-- SCRIPTS -->
      <script>
        // Fetch menu data and render
        let MENU_ITEMS = []; // GLOBAL MENU LIST
        let discountType = "none"; // none | percentage | fixed
        let discountValue = 0;

        async function fetchMenu() {
          const menu = await fetch("/static/menu.json").then((res) =>
            res.json(),
          );

          const getCategoryImage = (category) =>
            `/static/categories/${category.toLowerCase().replace(/ /g, "-")}.png`;

          const leftColumn = document.getElementById("leftColumn");
          const rightColumn = document.getElementById("rightColumn");

          const leftCategories = [];
          const rightCategories = [];

          for (let cat in menu.categories) {
            const items = menu.categories[cat];

            for (let itemName in items) {
              const val = items[itemName];

              if (typeof val === "number") {
                MENU_ITEMS.push({ name: itemName, price: val });
              } else if (typeof val === "object") {
                if (val.half)
                  MENU_ITEMS.push({
                    name: itemName + " (Half)",
                    price: val.half,
                  });
                if (val.full)
                  MENU_ITEMS.push({
                    name: itemName + " (Full)",
                    price: val.full,
                  });
              }
            }

            const hasAnyHalfFull = Object.values(items).some(
              (v) => typeof v === "object" && ("half" in v || "full" in v),
            );
            const allSinglePrice = Object.values(items).every(
              (v) => typeof v === "number",
            );

            if (allSinglePrice) leftCategories.push({ name: cat, items });
            else if (hasAnyHalfFull) rightCategories.push({ name: cat, items });
          }
          // --- SINGLE TEMPLATE FOR LEFT CATEGORY ---
          const leftTemplate = (category, items) => `
            <table class="w-full border-collapse mb-3">
              <thead>
                <tr class="group relative">               
                  <th class="text-left p-1 flex items-center gap-2">
                    <img src="${getCategoryImage(category)}" class="w-[40px]">
                    <h3 class="font-black text-md lg:text-lg text-[#FD9960] ml-2">${category}</h3>
                  </th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                  ${Object.entries(items)
                    .map(
                      ([item, price]) => `
                    <tr class="flex justify-between group transition-all duration-300">
                      <td class="py-0.5">
                        <div class="flex items-center gap-2">
                          <!-- Hover Icon -->
                          <i class="fa fa-caret-right text-black-500 opacity-0 group-hover:opacity-100 transform -translate-x-2 group-hover:translate-x-0 transition-all duration-300"></i>

                          <!-- Item Name -->
                          <div class="item-label px-2 rounded-md transition-all  ">
                            ${item}
                          </div>
                        </div>
                      </td>
                      <td class="p-0.5 text-center font-semibold flex items-center">
                        <button class="px-2 py-0.5 w-20 text-center border rounded bg-gradient-to-br from-blue-400 to-blue-600 hover:from-blue-500 hover:to-blue-700 text-white font-bold shadow-lg hover:shadow-xl transition-all" onclick="addToCart('${item.replace(/'/g, "\\'")}', ${price}, 1);">
                          ${price}/-
                        </button>
                      </td>
                    </tr>
                  `,
                    )
                    .join("")}
                </tbody>
              </table>
            `;
          // --- SINGLE TEMPLATE FOR RIGHT CATEGORY ---
          const rightTemplate = (category, items) => `
                <table class="w-full border-collapse mb-6">
                  <thead>
                    <tr>
                      <th class="text-left p-1 flex items-center gap-2">
                        <img src="${getCategoryImage(category)}" class="w-[50px]">
                        <h3 class="font-black text-xl lg:text-2xl text-[#FD9960] ml-2">${category}</h3>
                      </th>
                      <th class="text-center">Half</th>
                      <th class="text-center">Full</th>
                    </tr>
                  </thead>
                  <tbody>
                          ${Object.entries(items)
                            .map(
                              ([item, price]) => `
                        <tr class="group transition-all duration-300">
                        <td class="p-1">
                          <div class="flex items-center gap-2">

                        <!-- LEFT Hover Icon -->
                                <i class="fa fa-caret-right text-black-500 opacity-0 group-hover:opacity-100 transform -translate-x-2 group-hover:translate-x-0 transition-all duration-300"></i>

                        <!-- Item Name -->
                          <div class="item-label px-2 rounded-md transition-all  ">
                          ${item}
                          </div>

                      </div>
                    </td>
                      <!-- Half price cell -->
                      <td class="text-center font-semibold">
                        ${
                          typeof price === "object" && price.half
                            ? `<button class="px-2 py-1 w-20 text-center border rounded bg-gradient-to-br from-blue-500 to-blue-700 hover:from-blue-500 hover:to-blue-700 text-white font-bold shadow-lg hover:shadow-xl transition-all" onclick="addToCart('${item.replace(/'/g, "\\'")}', ${price.half}, 1, false, true);">${price.half}/-</button>`
                            : `<div class="w-20 h-8"></div>` // empty placeholder, same size but no background
                        }
                      </td>
                      <!-- Full price cell -->
                    <td class="text-center font-semibold">
                      ${
                        typeof price === "object"
                          ? price.half && price.full
                            ? `<button
                                class="px-2 py-1 w-20 text-center border rounded bg-gradient-to-br from-blue-500 to-blue-700 hover:from-blue-500 hover:to-blue-700 text-white font-bold shadow-lg hover:shadow-xl transition-all"
                                onclick="addToCart('${item.replace(/'/g, "\\'")}', ${price.full}, 1, true, false)"
                              >
                                ${price.full}/-
                              </button>`
                            : `<button
                                class="px-2 py-1 w-20 text-center border rounded bg-gradient-to-br from-blue-500 to-blue-700 hover:from-blue-500 hover:to-blue-700 text-white font-bold shadow-lg hover:shadow-xl transition-all"
                                onclick="addToCart('${item.replace(/'/g, "\\'")}', ${price.full ?? price}, 1)"
                              >
                                ${price.full ?? price}/-
                              </button>`
                          : `<button
                              class="px-2 py-1 w-20 text-center border rounded bg-gradient-to-br from-blue-500 to-blue-700 hover:from-blue-500 hover:to-blue-700 text-white font-bold shadow-lg hover:shadow-xl transition-all"
                              onclick="addToCart('${item.replace(/'/g, "\\'")}', ${price}, 1)"
                            >
                              ${price}/-
                            </button>`
                      }
                    </td>
                    </tr>
                          `,
                            )
                            .join("")}
                        </tbody>
                      </table>
              `;

          // Render left and right sections
          leftCategories.forEach(
            (cat) =>
              (leftColumn.innerHTML += leftTemplate(cat.name, cat.items)),
          );
          rightCategories.forEach(
            (cat) =>
              (rightColumn.innerHTML += rightTemplate(cat.name, cat.items)),
          );
        }
        fetchMenu();
      </script>
      <script>
        // Cart state
        const cart = {
          items: [], // array of {name, price, quantity}
          get total() {
            return this.items.reduce(
              (sum, item) => sum + item.price * item.quantity,
              0,
            );
          },
          get itemCount() {
            return this.items.reduce((sum, item) => sum + item.quantity, 0);
          },
        };
        exposeCart = cart; // make cart global for PDF generation
        // Elements
        const cartTotalEl = document.getElementById("cartTotal");
        const cartBadgeEl = document.getElementById("cartBadge");

        function updateCartUI() {
          // 1️⃣ Calculate subtotal (original total)
          const subtotal = cart.items.reduce(
            (sum, item) => sum + item.price * item.quantity,
            0,
          );

          // 2️⃣ Calculate discount
          let discountAmount = 0;
          if (discountType === "percentage") {
            discountAmount = (subtotal * discountValue) / 100;
          } else if (discountType === "fixed") {
            discountAmount = discountValue;
          }

          if (discountAmount > subtotal) discountAmount = subtotal;

          // 3️⃣ Calculate final total
          const finalTotal = subtotal - discountAmount;

          // 4️⃣ Update UI

          function generateInvoicePDF(bill) {

            const doc = new jsPDF("p", "mm", "a4");

            const pageHeight = doc.internal.pageSize.height;
            const margin = { top: 60, left: 14, right: 14 };

              doc.text("Phone: 78892-65130, 97817-70364", 105, 33, {
                align: "center",
              });
            }

            drawHeader();

            /* ================= INVOICE META ================= */
            const billDate = new Date(bill.time);
            const invoiceId = `INV-${billDate.getFullYear()}${String(
              billDate.getMonth() + 1,
            ).padStart(
              2,
              "0",
            )}${String(billDate.getDate()).padStart(2, "0")}-${bill.id}`;

            doc.setFontSize(10);
            doc.setFont("helvetica", "bold");
            doc.text("Invoice #:", 140, 46);
            doc.text("Invoice Date:", 140, 50);
            doc.setFont("helvetica", "normal");
            doc.text(invoiceId, 170, 46);
            doc.text(
              billDate.toLocaleDateString("en-GB", {
                day: "2-digit",
                month: "short",
                year: "numeric",
              }),
              170,
              50,
            );

            /* ================= TOTALS CALCULATION ================= */
            const subtotal =
              bill.subtotal ??
              bill.items.reduce((s, i) => s + i.price * i.quantity, 0);

            const discount = bill.discountAmount || 0;
            const cgst = +((subtotal - discount) * 0.025).toFixed(2);
            const sgst = +((subtotal - discount) * 0.025).toFixed(2);
            const total = +(subtotal - discount + cgst + sgst).toFixed(2);

            /* ================= TABLE DATA ================= */
            const tableData = bill.items.map((i) => [
              i.name,
              `Rs.${i.price.toFixed(2)}`,
              i.quantity,
              `Rs.${(i.price * i.quantity).toFixed(2)}`,
            ]);

            const tableStartY = 60;

            /* ===== EMPTY ROW LOGIC ===== */
            const rowHeight = 10;
            const subtotalBlockHeight = 42;
            const usableHeight = pageHeight - 20;

            const estimatedTableHeight = tableData.length * rowHeight;
            const remainingSpace =
              usableHeight -
              (tableStartY + estimatedTableHeight + subtotalBlockHeight);

            if (remainingSpace > rowHeight) {
              const emptyRows = Math.floor(remainingSpace / rowHeight);
              for (let i = 0; i < emptyRows; i++) {
                tableData.push(["", "", "", ""]);
              }
            }

            /* ================= TABLE ================= */
            doc.autoTable({
              startY: tableStartY,
              margin: margin,
              head: [["Description", "Price", "QTY", "Total"]],
              body: tableData,
              styles: { fontSize: 10, cellPadding: 3 },
              headStyles: {
                fillColor: [33, 33, 33],
                textColor: 255,
                fontStyle: "bold",
              },
              columnStyles: {

                3: { halign: "right", cellWidth: 30 },
              },
              didDrawPage: (data) => {
                drawHeader();

                const topY = data.settings.startY;
                const bottomY = data.cursor.y;

                colX.forEach((x) => {
                  doc.setLineWidth(0.3);
                  doc.line(x, topY, x, bottomY);
                });

                doc.line(tableLeft, bottomY, tableRight, bottomY);
              },
            });

            /* ================= TOTALS DRAWING ================= */
            let totalsY = doc.lastAutoTable.finalY + 6;

            if (totalsY + 40 > pageHeight) {
              doc.addPage();
              drawHeader();
              totalsY = 60;
            }

            doc.setFont("helvetica", "normal");

            doc.text("Subtotal", 142, totalsY);
            doc.text(`Rs.${subtotal.toFixed(2)}`, 194, totalsY, {

        const logos = [
          "/static/bg/1.png",
          "/static/bg/2.png",
          "/static/bg/3.png",
          "/static/bg/4.png",
          "/static/bg/5.png",
          "/static/bg/6.png",

        ];
        const animations = ["floatUp", "zigzag", "rotateUp"];
        function createLogo(initial = false) {
          // 🔒 MAX 6 LOGOS
          // if (bg.children.length >= 6) return;
          const img = document.createElement("img");
          img.src = logos[Math.floor(Math.random() * logos.length)];
          img.className = "logo";

          const size = Math.random() * 15 + 35; // 35–50px
          img.style.width = size + "px";
          img.style.left = Math.random() * 95 + "vw";

          const anim =

          const duration = Math.random() * 6 + 14; // 14–20s

          img.style.animation = `${anim} ${duration}s linear infinite`;

          setTimeout(() => img.remove(), 60000);
